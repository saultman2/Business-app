openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: BuildPro Construction Business Manager API
servers:
  - url: /api
    description: Base API path
tags:
  - name: ai
    description: AI-powered estimate and material suggestions
  - name: health
    description: Health operations
  - name: company
    description: Company profile and settings
  - name: clients
    description: Customer management
  - name: jobs
    description: Job/project management
  - name: materials
    description: Per-job material lists
  - name: estimates
    description: Estimate management
  - name: estimate-items
    description: Estimate line items
  - name: invoices
    description: Invoices and payments
  - name: photos
    description: Job photos
  - name: receipts
    description: Receipt management
  - name: calendar
    description: Calendar events / scheduling
  - name: dashboard
    description: Dashboard summary data
  - name: Storage
    description: Object storage upload and serving endpoints

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Dashboard KPI summary
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  # ──────────────────────────────────────
  # COMPANY / SETTINGS
  # ──────────────────────────────────────
  /company:
    get:
      operationId: getCompany
      tags: [company]
      summary: Get current company profile/settings
      responses:
        "200":
          description: Company
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Company"
    patch:
      operationId: updateCompany
      tags: [company]
      summary: Update company profile/settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CompanyUpdate"
      responses:
        "200":
          description: Updated company
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Company"

  # ──────────────────────────────────────
  # CLIENTS / CUSTOMERS
  # ──────────────────────────────────────
  /clients:
    get:
      operationId: listClients
      tags: [clients]
      summary: List customers
      parameters:
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of customers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ClientListItem"
    post:
      operationId: createClient
      tags: [clients]
      summary: Create a customer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClientInput"
      responses:
        "201":
          description: Created customer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Client"

  /clients/{id}:
    get:
      operationId: getClient
      tags: [clients]
      summary: Get a customer by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Customer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Client"
        "404":
          description: Not found
    patch:
      operationId: updateClient
      tags: [clients]
      summary: Update a customer
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClientUpdate"
      responses:
        "200":
          description: Updated customer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Client"
    delete:
      operationId: deleteClient
      tags: [clients]
      summary: Delete a customer
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /clients/{id}/history:
    get:
      operationId: getClientHistory
      tags: [clients]
      summary: Get customer job history and totals
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Customer history
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClientHistory"

  # ──────────────────────────────────────
  # JOBS
  # ──────────────────────────────────────
  /jobs:
    get:
      operationId: listJobs
      tags: [jobs]
      summary: List jobs
      parameters:
        - name: status
          in: query
          schema:
            type: string
        - name: clientId
          in: query
          schema:
            type: integer
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of jobs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Job"
    post:
      operationId: createJob
      tags: [jobs]
      summary: Create a job
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JobInput"
      responses:
        "201":
          description: Created job
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Job"

  /jobs/{id}:
    get:
      operationId: getJob
      tags: [jobs]
      summary: Get a job by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Job
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Job"
        "404":
          description: Not found
    patch:
      operationId: updateJob
      tags: [jobs]
      summary: Update a job
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JobUpdate"
      responses:
        "200":
          description: Updated job
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Job"
    delete:
      operationId: deleteJob
      tags: [jobs]
      summary: Delete a job
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /jobs/{id}/summary:
    get:
      operationId: getJobSummary
      tags: [jobs]
      summary: Get job with related counts/totals
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Job summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobSummary"

  # ──────────────────────────────────────
  # MATERIAL LISTS (per job)
  # ──────────────────────────────────────
  /jobs/{jobId}/material-list:
    get:
      operationId: getJobMaterialList
      tags: [materials]
      summary: Get (or create) the material list for a job, with items and totals
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Material list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MaterialListDetail"
    patch:
      operationId: updateJobMaterialList
      tags: [materials]
      summary: Update material list meta (name/notes)
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MaterialListUpdate"
      responses:
        "200":
          description: Updated material list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MaterialListDetail"

  /jobs/{jobId}/material-list/items:
    post:
      operationId: createMaterialItem
      tags: [materials]
      summary: Add an item to the job material list
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MaterialItemInput"
      responses:
        "201":
          description: Created material item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MaterialItem"

  /material-items/{id}:
    patch:
      operationId: updateMaterialItem
      tags: [materials]
      summary: Update a material item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MaterialItemUpdate"
      responses:
        "200":
          description: Updated material item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MaterialItem"
    delete:
      operationId: deleteMaterialItem
      tags: [materials]
      summary: Delete a material item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ──────────────────────────────────────
  # ESTIMATES
  # ──────────────────────────────────────
  /estimates:
    get:
      operationId: listEstimates
      tags: [estimates]
      summary: List estimates
      parameters:
        - name: status
          in: query
          schema:
            type: string
        - name: jobId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of estimates
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Estimate"
    post:
      operationId: createEstimate
      tags: [estimates]
      summary: Create an estimate (optionally from a job's material list)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EstimateInput"
      responses:
        "201":
          description: Created estimate
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EstimateDetail"

  /estimates/{id}:
    get:
      operationId: getEstimate
      tags: [estimates]
      summary: Get an estimate with items
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Estimate detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EstimateDetail"
        "404":
          description: Not found
    patch:
      operationId: updateEstimate
      tags: [estimates]
      summary: Update an estimate (recalculates totals)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EstimateUpdate"
      responses:
        "200":
          description: Updated estimate
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EstimateDetail"
    delete:
      operationId: deleteEstimate
      tags: [estimates]
      summary: Delete an estimate
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /estimates/{id}/send:
    post:
      operationId: sendEstimate
      tags: [estimates]
      summary: Send estimate via email or text (marks as sent)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendEstimateInput"
      responses:
        "200":
          description: Send result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SendResult"

  /estimates/{id}/approve:
    post:
      operationId: approveEstimate
      tags: [estimates]
      summary: Mark estimate approved
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Approved estimate
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EstimateDetail"

  /estimates/{id}/convert-to-invoice:
    post:
      operationId: convertEstimateToInvoice
      tags: [estimates]
      summary: Create an invoice from an approved estimate
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "201":
          description: Created invoice
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Invoice"

  /estimates/{estimateId}/items:
    post:
      operationId: createEstimateItem
      tags: [estimate-items]
      summary: Add a line item to an estimate
      parameters:
        - name: estimateId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EstimateItemInput"
      responses:
        "201":
          description: Created item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EstimateItem"

  /estimate-items/{id}:
    patch:
      operationId: updateEstimateItem
      tags: [estimate-items]
      summary: Update an estimate line item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EstimateItemUpdate"
      responses:
        "200":
          description: Updated item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EstimateItem"
    delete:
      operationId: deleteEstimateItem
      tags: [estimate-items]
      summary: Delete an estimate line item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ──────────────────────────────────────
  # INVOICES / PAYMENTS
  # ──────────────────────────────────────
  /invoices:
    get:
      operationId: listInvoices
      tags: [invoices]
      summary: List invoices
      parameters:
        - name: status
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of invoices
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Invoice"
    post:
      operationId: createInvoice
      tags: [invoices]
      summary: Create an invoice
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InvoiceInput"
      responses:
        "201":
          description: Created invoice
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Invoice"

  /invoices/{id}:
    get:
      operationId: getInvoice
      tags: [invoices]
      summary: Get an invoice with payments
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Invoice detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvoiceDetail"
        "404":
          description: Not found
    patch:
      operationId: updateInvoice
      tags: [invoices]
      summary: Update an invoice
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InvoiceUpdate"
      responses:
        "200":
          description: Updated invoice
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvoiceDetail"
    delete:
      operationId: deleteInvoice
      tags: [invoices]
      summary: Delete an invoice
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /invoices/{invoiceId}/payments:
    post:
      operationId: createPayment
      tags: [invoices]
      summary: Record a payment on an invoice
      parameters:
        - name: invoiceId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PaymentInput"
      responses:
        "201":
          description: Updated invoice with payment applied
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvoiceDetail"

  # ──────────────────────────────────────
  # JOB PHOTOS
  # ──────────────────────────────────────
  /jobs/{jobId}/photos:
    get:
      operationId: listJobPhotos
      tags: [photos]
      summary: List photos for a job
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of photos
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/JobPhoto"
    post:
      operationId: createJobPhoto
      tags: [photos]
      summary: Add a photo to a job
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JobPhotoInput"
      responses:
        "201":
          description: Created photo
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobPhoto"

  /job-photos/{id}:
    patch:
      operationId: updateJobPhoto
      tags: [photos]
      summary: Update a job photo
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JobPhotoUpdate"
      responses:
        "200":
          description: Updated photo
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobPhoto"
    delete:
      operationId: deleteJobPhoto
      tags: [photos]
      summary: Delete a job photo
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ──────────────────────────────────────
  # RECEIPTS
  # ──────────────────────────────────────
  /receipts:
    get:
      operationId: listReceipts
      tags: [receipts]
      summary: List receipts
      parameters:
        - name: jobId
          in: query
          schema:
            type: integer
        - name: category
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of receipts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Receipt"
    post:
      operationId: createReceipt
      tags: [receipts]
      summary: Create a receipt
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReceiptInput"
      responses:
        "201":
          description: Created receipt
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Receipt"

  /receipts/{id}:
    get:
      operationId: getReceipt
      tags: [receipts]
      summary: Get a receipt by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Receipt
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Receipt"
        "404":
          description: Not found
    patch:
      operationId: updateReceipt
      tags: [receipts]
      summary: Update a receipt
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReceiptUpdate"
      responses:
        "200":
          description: Updated receipt
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Receipt"
    delete:
      operationId: deleteReceipt
      tags: [receipts]
      summary: Delete a receipt
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ──────────────────────────────────────
  # CALENDAR EVENTS
  # ──────────────────────────────────────
  /events:
    get:
      operationId: listEvents
      tags: [calendar]
      summary: List calendar events
      parameters:
        - name: jobId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CalendarEvent"
    post:
      operationId: createEvent
      tags: [calendar]
      summary: Create a calendar event
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CalendarEventInput"
      responses:
        "201":
          description: Created event
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CalendarEvent"

  /events/{id}:
    get:
      operationId: getEvent
      tags: [calendar]
      summary: Get an event by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Event
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CalendarEvent"
        "404":
          description: Not found
    patch:
      operationId: updateEvent
      tags: [calendar]
      summary: Update an event
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CalendarEventUpdate"
      responses:
        "200":
          description: Updated event
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CalendarEvent"
    delete:
      operationId: deleteEvent
      tags: [calendar]
      summary: Delete an event
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ──────────────────────────────────────
  # AI
  # ──────────────────────────────────────
  /ai/quote-estimate:
    post:
      operationId: aiQuoteEstimate
      tags: [ai]
      summary: Generate AI line-item estimate from job description and photos
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AiQuoteEstimateInput"
      responses:
        "200":
          description: AI-generated line items
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiQuoteEstimateResult"

  /ai/suggest-materials:
    post:
      operationId: aiSuggestMaterials
      tags: [ai]
      summary: Generate AI material suggestions for a job
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AiSuggestMaterialsInput"
      responses:
        "200":
          description: AI-suggested material items
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiSuggestMaterialsResult"

  /ai/invoice-description:
    post:
      operationId: aiInvoiceDescription
      tags: [ai]
      summary: Generate a professional services description and payment terms for an invoice
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AiInvoiceDescriptionInput"
      responses:
        "200":
          description: AI-generated invoice description and payment terms
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiInvoiceDescriptionResult"

  # ──────────────────────────────────────
  # STORAGE
  # ──────────────────────────────────────
  /storage/uploads/request-url:
    post:
      tags: [Storage]
      operationId: requestUploadUrl
      summary: Request a presigned URL for file upload
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UploadUrlRequest"
      responses:
        "200":
          description: Presigned upload URL generated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadUrlResponse"
        "400":
          description: Missing or invalid required fields.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "500":
          description: Failed to generate upload URL.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

